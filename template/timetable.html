{% load static %} 
<!DOCTYPE html>
<html>
<head>
<title>Secure Timetable</title>

<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    text-align: center;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 90%;
}

th, td {
    border: 1px solid #555;
    padding: 10px;
}

th { background: #4CAF50; }
td { background: #2c2c3e; }

.lunch {
    background: orange !important;
    font-weight: bold;
}

.current {
    background: #00c853 !important;
    font-weight: bold;
}

input {
    width: 100%;
    border: none;
    background: transparent;
    color: white;
    text-align: center;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border-radius: 5px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>📅 Timetable</h1>

<table id="timetable">
<thead>
<tr>
    <th>Day</th>
    <th>9-10</th>
    <th>10-11</th>
    <th>11-12</th>
    <th class="lunch">Lunch</th>
    <th>1-2</th>
    <th>2-3</th>
</tr>
</thead>
<tbody>
<tr>
    <th>Monday</th>
    <td>S.E</td>
    <td>C.L</td>
    <td>DBMS</td>
    <td class="lunch">Lunch</td>
    <td>ENG</td>
    <td>R.B</td>
</tr>

<tr>
    <th>Tuesday</th>
    <td>DBMS</td>
    <td>R.B</td>
    <td>PYTHON</td>
    <td class="lunch">Lunch</td>
    <td>C.L</td>
    <td>ENG</td>
</tr>

<tr>
    <th>Wednesday</th>
    <td>C.L</td>
    <td>R.B</td>
    <td>ENG</td>
    <td class="lunch">Lunch</td>
    <td>PYTHON</td>
    <td>S.E</td>
</tr>

<tr>
    <th>Thursday</th>
    <td>ENG</td>
    <td>C.L</td>
    <td>S.E</td>
    <td class="lunch">Lunch</td>
    <td>R.B</td>
    <td>PYTHON</td>
</tr>

<tr>
    <th>Friday</th>
    <td>DBMS</td>
    <td>R.B</td>
    <td>PYTHON</td>
    <td class="lunch">Lunch</td>
    <td>C.L</td>
    <td>FREE</td>
</tr>
</tbody>
</table>

<div id="syllabusContainer"></div>

<a href="{% url 'home' %}">
    <button>🏠 Go to Home</button>
</a>

<!-- ONLY CLEAN SCRIPT KEPT -->
<script>
function highlightCurrentPeriod() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();

    const currentTime = hours + minutes / 60;

    let periodIndex = -1;

    if (currentTime >= 9 && currentTime < 10) periodIndex = 1;
    else if (currentTime >= 10 && currentTime < 11) periodIndex = 2;
    else if (currentTime >= 11 && currentTime < 12) periodIndex = 3;
    else if (currentTime >= 13 && currentTime < 14) periodIndex = 5;
    else if (currentTime >= 14 && currentTime < 15) periodIndex = 6;

    const today = new Date().getDay();
    const rows = document.querySelectorAll("#timetable tbody tr");

    rows.forEach(row => {
        row.querySelectorAll("td").forEach(td => td.classList.remove("current"));
    });

    if (today >= 1 && today <= 5 && periodIndex !== -1) {
        const row = rows[today - 1];
        const cell = row.children[periodIndex];
        if (cell) {
            cell.classList.add("current");
        }
    }
}

setInterval(highlightCurrentPeriod, 60000);
highlightCurrentPeriod();
</script>

</body>
</html>
