<!DOCTYPE html>
<html>
<head>
<title>Secure Timetable</title>

<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    text-align: center;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 90%;
}

th, td {
    border: 1px solid #555;
    padding: 10px;
}

th { background: #4CAF50; }
td { background: #2c2c3e; }

.lunch {
    background: orange !important;
    font-weight: bold;
}

.current {
    background: #00c853 !important;
    font-weight: bold;
}

input {
    width: 100%;
    border: none;
    background: transparent;
    color: white;
    text-align: center;
}


button {
    padding: 8px 12px;
    margin: 5px;
    border-radius: 5px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>📅 Timetable</h1>

<table id="timetable">
<thead>
<tr>
    <th>Day</th>
    <th>9-10</th>
    <th>10-11</th>
    <th>11-12</th>
    <th class="lunch">Lunch</th>
    <th>1-2</th>
    <th>2-3</th>
</tr>
</thead>
<tbody></tbody>
</table>



<div id="syllabusContainer"></div>

<a href="{% url 'home' %}">
    <button>🏠 Go to Home</button>
</a>

<script>

constdays = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
consttbody = document.querySelector("#timetable tbody");

// Create table
days.forEach((day, rowIndex) => {

    const tr = document.createElement("tr");

    const th = document.createElement("th");
    th.textContent = day;
    tr.appendChild(th);

    for (let col = 0; col < 6; col++) {

        if (col === 3) {
            const td = document.createElement("td");
            td.textContent = "Lunch";
            td.className = "lunch";
            tr.appendChild(td);
            continue;
        }

        const td = document.createElement("td");
        const input = document.createElement("input");

        const actualCol = col > 3 ? col - 1 : col;
        input.id = `cell-${rowIndex}-${actualCol}`;
        input.addEventListener("input", saveData);

        td.appendChild(input);
        tr.appendChild(td);
    }

    tbody.appendChild(tr);
});

/* -------- SAVE -------- */
function saveData() {
    let data = {};
    document.querySelectorAll("input").forEach(input => {
        data[input.id] = input.value;
    });
    localStorage.setItem("timetable", JSON.stringify(data));
}

/* -------- LOAD -------- */
function loadData() {
    let data = JSON.parse(localStorage.getItem("timetable")) || {};
    document.querySelectorAll("input").forEach(input => {
        input.value = data[input.id] || "";
    });
}

loadData();

/* -------- LIVE TIMETABLE (ADDED ONLY) -------- */

function highlightCurrentPeriod() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();

    const currentTime = hours + minutes / 60;

    let periodIndex = -1;

    if (currentTime >= 9 && currentTime < 10) periodIndex = 0;
    else if (currentTime >= 10 && currentTime < 11) periodIndex = 1;
    else if (currentTime >= 11 && currentTime < 12) periodIndex = 2;
    else if (currentTime >= 13 && currentTime < 14) periodIndex = 3;
    else if (currentTime >= 14 && currentTime < 15) periodIndex = 4;

    const today = new Date().getDay();
    const rowIndex = today - 1;

    document.querySelectorAll("#timetable td").forEach(td => {
        td.classList.remove("current");
    });

    if (rowIndex >= 0 && rowIndex < 5 && periodIndex !== -1) {
        const cell = document.querySelector(`#cell-${rowIndex}-${periodIndex}`);
        if (cell) {
            cell.parentElement.classList.add("current");
        }
    }
}

setInterval(highlightCurrentPeriod, 60000);
highlightCurrentPeriod();


</script>
